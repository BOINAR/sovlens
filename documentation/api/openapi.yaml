openapi: 3.0.3

info:
  title: Sovlens API
  description: API REST de l'application Sovlens
  version: 1.0.0

servers:
  - url: http://localhost:4000
    description: Environnement local

tags:
  - name: Auth
  - name: Users
  - name: Photos
  - name: Albums
  - name: Sharing
  - name: Storage

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Créer un compte utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              valid:
                value:
                  email: user@sovlens.local
                  password: Password123!
      responses:
        "201":
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email déjà utilisé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Connecter un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              valid:
                value:
                  email: user@sovlens.local
                  password: Password123!
      responses:
        "200":
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rafraîchir le token d'accès
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Nouveau token généré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Refresh token invalide ou expiré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnecter l'utilisateur
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Déconnexion réussie
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Demander une réinitialisation du mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
            examples:
              valid:
                value:
                  email: user@sovlens.local
      responses:
        "200":
          description: Email de réinitialisation envoyé si le compte existe
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Réinitialiser le mot de passe avec un jeton
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
            examples:
              valid:
                value:
                  token: reset-token-example
                  password: NewPassword123!
      responses:
        "204":
          description: Mot de passe réinitialisé
        "400":
          description: Jeton invalide, expiré ou mot de passe invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      tags: [Users]
      summary: Récupérer le profil utilisateur connecté
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil utilisateur connecté
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/password:
    patch:
      tags: [Users]
      summary: Modifier le mot de passe de l'utilisateur connecté
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordRequest"
            examples:
              valid:
                value:
                  currentPassword: Password123!
                  newPassword: NewPassword123!
      responses:
        "204":
          description: Mot de passe modifié
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié ou mot de passe actuel incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /photos:
    get:
      tags: [Photos]
      summary: Lister les photos de l'utilisateur connecté
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Photos]
      summary: Importer une photo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Photo importée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "400":
          description: Fichier invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Fichier supérieur à 10 Mo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /photos/{id}:
    get:
      tags: [Photos]
      summary: Récupérer une photo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PhotoId"
      responses:
        "200":
          description: Détail d'une photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Photo introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Photos]
      summary: Supprimer une photo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PhotoId"
      responses:
        "204":
          description: Photo supprimée
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Photo introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /albums:
    get:
      tags: [Albums]
      summary: Lister les albums de l'utilisateur connecté
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Albums]
      summary: Créer un album
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlbumRequest"
            examples:
              valid:
                value:
                  name: Vacances
      responses:
        "201":
          description: Album créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /albums/{id}:
    get:
      tags: [Albums]
      summary: Récupérer un album
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlbumId"
      responses:
        "200":
          description: Détail d'un album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Album introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Albums]
      summary: Modifier un album
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlbumId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAlbumRequest"
      responses:
        "200":
          description: Album modifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Album introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Albums]
      summary: Supprimer un album
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlbumId"
      responses:
        "204":
          description: Album supprimé
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Album introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /albums/{id}/photos:
    post:
      tags: [Albums]
      summary: Ajouter une photo à un album
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlbumId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPhotoToAlbumRequest"
      responses:
        "200":
          description: Photo ajoutée à l'album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "400":
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Album ou photo introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /albums/{id}/photos/{photoId}:
    delete:
      tags: [Albums]
      summary: Retirer une photo d'un album
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlbumId"
        - $ref: "#/components/parameters/PhotoIdAsPhotoId"
      responses:
        "204":
          description: Photo retirée de l'album
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Album ou photo introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sharing/photos/{id}:
    post:
      tags: [Sharing]
      summary: Créer un lien public de partage pour une photo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PhotoId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkRequest"
      responses:
        "201":
          description: Lien de partage créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Photo introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sharing/albums/{id}:
    post:
      tags: [Sharing]
      summary: Créer un lien public de partage pour un album
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AlbumId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkRequest"
      responses:
        "201":
          description: Lien de partage créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareLink"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès refusé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Album introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shared/{token}:
    get:
      tags: [Sharing]
      summary: Accéder à une ressource partagée publiquement
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: Ressource partagée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedResource"
        "404":
          description: Lien introuvable ou expiré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/config:
    get:
      tags: [Storage]
      summary: Récupérer la configuration de stockage
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Configuration actuelle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageConfig"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Storage]
      summary: Modifier la configuration de stockage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStorageConfigRequest"
      responses:
        "200":
          description: Configuration mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageConfig"
        "400":
          description: Configuration invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PhotoId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PhotoIdAsPhotoId:
      name: photoId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AlbumId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ShareToken:
      name: token
      in: path
      required: true
      schema:
        type: string

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8

    UpdatePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    Photo:
      type: object
      required:
        - id
        - filename
        - mimeType
        - objectKey
        - url
        - size
        - storageMode
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
        objectKey:
          type: string
        url:
          type: string
          description: URL d'accès générée par le backend
        size:
          type: integer
          maximum: 10485760
        storageMode:
          type: string
          enum: [cloud, sovereign]
        createdAt:
          type: string
          format: date-time

    Album:
      type: object
      required: [id, name, photos, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        photos:
          type: array
          items:
            $ref: "#/components/schemas/Photo"
        createdAt:
          type: string
          format: date-time

    CreateAlbumRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    UpdateAlbumRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    AddPhotoToAlbumRequest:
      type: object
      required: [photoId]
      properties:
        photoId:
          type: string
          format: uuid

    CreateShareLinkRequest:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ShareLink:
      type: object
      required: [token, url, createdAt]
      properties:
        token:
          type: string
        url:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    SharedResource:
      type: object
      required: [type, resource]
      properties:
        type:
          type: string
          enum: [photo, album]
        resource:
          oneOf:
            - $ref: "#/components/schemas/Photo"
            - $ref: "#/components/schemas/Album"

    StorageConfig:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [cloud, sovereign]
        endpoint:
          type: string
          nullable: true
        bucket:
          type: string
          nullable: true

    UpdateStorageConfigRequest:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [cloud, sovereign]
        endpoint:
          type: string
          nullable: true
        accessKey:
          type: string
          nullable: true
        secretKey:
          type: string
          nullable: true
        bucket:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string