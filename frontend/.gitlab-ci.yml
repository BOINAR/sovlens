stages:
  - lint

variables:
  PNPM_VERSION: "9"

lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm lint
  only:
    - merge_requests
    - main
    - develop